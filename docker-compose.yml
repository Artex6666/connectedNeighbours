services:

  # ── Databases ────────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: cn_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bobconnect
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: cn_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/password
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────

  back:
    build:
      context: .
      dockerfile: back/Dockerfile
    container_name: cn_back
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/bobconnect
      NEO4J_ENABLED: "false"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      JWT_SECRET: change_this_in_production
      JWT_REFRESH_SECRET: change_this_refresh_in_production
      FRONTEND_URL: http://localhost:80
    depends_on:
      mongodb:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────────

  front:
    build:
      context: .
      dockerfile: front/Dockerfile
    container_name: cn_front
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - back

volumes:
  mongodb_data:
  neo4j_data:
